<!DOCTYPE html>
<!-- o doctype informar ao navegador que o documento é do tipo HTML5 -->

<html lang="pt-br">
<!-- o HTML ele é um elemento raiz, ou elemento principal.Ele representa de fato o HTML o 
 lang (languange que significa idioma), é um atributo que define/configura e tipo de idioma de arquivo-->


<head> 
<!-- Head Fica responsável por lidar com ás configurações da página. contém configurações "invisíveis" da página -->

 <meta charset="UTF-8">
<!-- Meta fornece metadados são informações descritivias que não aparece diretamente no conteúdo da página
 elas ajudam os navegadores, mecanismos de busca (ex:Google) a entenderem melhor o que a página contém.-->


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Esse name " viewport ele lida com a janela de visualização, 
     ou altura e largura do dispositivo/navegador que está acessando o site.-->

 <!--width=device-width - Esse trecho basicamente fala o seguinte "Use a largura real do dispositivo 
 como base para exibir esta página" -->

    <title> Como fazer pão de queijo </title> 
   <!-- Title Nome ou título tema da página. exem: Como fazer pão de queijo -->

<!-- Body  representa o corpo do documento, ou seja, é o elemento que contém todo o conteúdo visível da página web 
 que será exibido no navegador -->

 <!-- Tag, ou marcação forma de dar conteúdo.-->


</head>
<body>
<H1></H1>
</body>
</html>
